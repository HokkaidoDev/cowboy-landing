<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CowBoy</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper">
      <!-- #region HEADER -->
      <header class="header">
        <div class="header__container">
          <img class="header__logo" src="./img/logo.png" alt="Logo CowBoy" />
          <nav class="header__menu menu">
            <ul class="menu__list">
              <li class="menu__item">
                <a href="#" class="menu__link">Home</a>
              </li>

              <li class="menu__item">
                <a href="#" class="menu__link">Models</a>
              </li>

              <li class="menu__item">
                <a href="#" class="menu__link">Download</a>
              </li>

              <li class="menu__item">
                <a href="#" class="menu__link">Video</a>
              </li>
            </ul>
          </nav>

          <a href="#" class="header__button">Order now</a>
        </div>
      </header>
      <!-- #endregion -->

      <main class="page">
        <!-- #region HERO -->
        <section class="hero">
          <div class="hero__container">
            <div class="hero__content">
              <h1 class="hero__title">The Future of Urban Mobility</h1>
              <div class="hero__text">
                <p>
                  Experience the ride of your life with Cowboy’s sleek, smart,
                  and powerful electric bikes designed for urban adventurers.
                </p>
              </div>
              <div class="hero__buttons">
                <a href="#" class="hero__button button button--dark">
                  Explore Models
                </a>
                <a href="#" class="hero__button button">Start Your Ride</a>
              </div>
            </div>

            <figure class="hero__picture">
              <img src="img/hero/image.webp" alt="Image" class="hero__image" />
            </figure>
          </div>
        </section>
        <!-- #endregion -->
      </main>

      <footer class="footer"></footer>
    </div>
  </body>
</html>
